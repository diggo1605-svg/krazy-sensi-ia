<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krazy Sensi .IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="tituloApp">Krazy Sensi .IA</h1>

    <div id="tabs" class="card">
        <button onclick="abrirTab('celular')">Sensi por Celular 📱</button>
        <button onclick="abrirTab('arma')">Sensi por Arma 🎯</button>
        <button onclick="abrirTab('dpi')">Calculador de DPI 🍏</button>
        <button onclick="abrirTab('ciclos')">Ciclos iPhone 🍎</button>
        <button onclick="abrirTab('redes')">Redes ❤️</button>
    </div>

    <div id="loading">IA processando...</div>

    <div id="boxKey" class="card"></div>

    <!-- Abas -->
    <div id="celular" class="tabContent card">
        <h3>Gerar Sensi por Celular</h3>
        <input type="text" id="marcaCelular" placeholder="Digite a marca">
        <input type="text" id="modeloCelular" placeholder="Digite o modelo">
        <button onclick="gerarSensi('celular')">Gerar Sensi</button>
    </div>

    <div id="arma" class="tabContent card">
        <h3>Gerar Sensi por Arma</h3>
        <select id="tipoArma">
            <option>UMP</option>
            <option>XM8</option>
            <option>Desert</option>
            <option>M1014</option>
            <option>Carapina</option>
            <option>AC80</option>
        </select>
        <button onclick="gerarSensi('arma')">Gerar Sensi</button>
    </div>

    <div id="dpi" class="tabContent card">
        <h3>Calculador de DPI Inteligente</h3>
        <button onclick="gerarSensi('dpi')">Calcular DPI</button>
    </div>

    <div id="ciclos" class="tabContent card">
        <h3>Ciclos para iPhone</h3>
        <button onclick="gerarSensi('ciclos')">Calcular Ciclos</button>
    </div>

    <div id="redes" class="tabContent card">
        <h3>Redes Sociais</h3>
        <p>Siga: <a href="https://instagram.com/seuusuario" target="_blank">@seuusuario</a></p>
    </div>

    <!-- Painel ADM -->
    <div id="admPanel" class="card">
        <h3>Painel ADM</h3>
        <button onclick="gerarKey()">Gerar Key Aleatória</button>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
    <script>
        // Função para alternar abas
        function abrirTab(tabName) {
            document.querySelectorAll('.tabContent').forEach(tab => {
                tab.classList.remove('activeTab');
            });
            document.getElementById(tabName).classList.add('activeTab');
        }

        // Abrir a primeira aba por padrão
        abrirTab('celular');
    </script>
</body>
                              </html>
