<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Krazy Sensi .IA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="tituloApp">🔥 KRAZY SENSI .IA 🔥</h1>

<!-- LOGIN -->
<div id="loginArea" class="card">
  <h3>Digite sua Key</h3>
  <input type="text" id="inputKey" placeholder="KZ-XXXXXXX">
  <br>
  <button onclick="validarKey()">Entrar</button>
  <p id="status"></p>
</div>

<!-- GERADOR -->
<div id="geradorArea" class="card" style="display:none;">
  <div id="tabs">
    <button onclick="abrirTab('celular')">📱 Celular</button>
    <button onclick="abrirTab('arma')">🎯 Arma</button>
    <button onclick="abrirTab('dpi')">🎛️ DPI</button>
    <button onclick="abrirTab('ciclos')">🍎 Ciclos iPhone</button>
    <button onclick="abrirTab('rede')">❤️ Minha Rede</button>
  </div>

  <!-- CELULAR -->
  <div id="celular" class="tabContent">
    <h3>Gerar Sensi por Celular</h3>
    <label>Marca</label><br>
    <select id="marca">
      <option>Samsung</option>
      <option>Xiaomi</option>
      <option>Motorola</option>
      <option>iPhone</option>
    </select>
    <br><br>
    <label>Modelo</label><br>
    <input type="text" id="modelo" placeholder="Ex: Redmi Note 7">
    <br><br>
    <label>Potência do Celular</label><br>
    <select id="potencia">
      <option value="baixa">Baixa</option>
      <option value="media">Média</option>
      <option value="alta">Alta</option>
    </select>
    <br><br>
    <button onclick="gerarSensi('celular')">Gerar Sensibilidade</button>
    <div id="resultadoSensi" style="margin-top:20px; min-height:120px;"></div>
  </div>

  <!-- ARMA -->
  <div id="arma" class="tabContent">
    <h3>Gerar Sensi por Arma</h3>
    <div id="armas">
      <button onclick="gerarSensi('arma','UMP')">UMP 🎯</button>
      <button onclick="gerarSensi('arma','XM8')">XM8 🎯</button>
      <button onclick="gerarSensi('arma','Desert')">Desert 🎯</button>
      <button onclick="gerarSensi('arma','M1014')">M1014 🎯</button>
      <button onclick="gerarSensi('arma','Carapina')">Carapina 🎯</button>
      <button onclick="gerarSensi('arma','AC80')">AC80 🎯</button>
    </div>
    <div id="resultadoArma" style="margin-top:20px; min-height:120px;"></div>
  </div>

  <!-- DPI -->
  <div id="dpi" class="tabContent">
    <h3>Calculador Inteligente de DPI</h3>
    <label>Sensi Geral</label><br>
    <input type="number" id="sensiDPI" placeholder="Ex: 150">
    <br><br>
    <button onclick="calcularDPI()">Calcular DPI</button>
    <div id="resultadoDPI" style="margin-top:20px;"></div>
  </div>

  <!-- CICLOS IPHONE -->
  <div id="ciclos" class="tabContent">
    <h3>Calculador de Ciclos para iPhone 🍎</h3>
    <label>DPI</label><br>
    <input type="number" id="cicloIphone" placeholder="Ex: 800">
    <label>Sensi</label><br>
    <input type="number" id="sensiIphone" placeholder="Ex: 150">
    <br><br>
    <button onclick="calcularCiclos()">Calcular Ciclos</button>
    <div id="resultadoCiclos" style="margin-top:20px;"></div>
  </div>

  <!-- MINHA REDE -->
  <div id="rede" class="tabContent">
    <h3>❤️ Siga @diggo_vini07</h3>
    <p>Instagram: <a href="https://instagram.com/diggo_vini07" target="_blank">@krazy</a></p>
    <p>Discord: <a href="#" target="_blank">Krazy Server</a></p>
  </div>
</div>

<!-- PAINEL ADM -->
<div id="admPanel" class="card">
  <h3>Painel ADM</h3>
  <input type="text" id="dias" placeholder="Dias ou permanente">
  <br>
  <button onclick="gerarKey()">Gerar Key</button>
  <div id="boxKey" style="display:none;margin-top:15px;">
    <h3 id="keyGerada"></h3>
    <button onclick="copiarKey()">📋 Copiar</button>
    <p id="copiadoMsg"></p>
  </div>
</div>

<script src="script.js" type="module"></script>
</body>
      </html>
